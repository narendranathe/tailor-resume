# fly.toml — tailor-resume web backend
# Deploy: cd web_app && fly deploy --remote-only

app = "tailor-resume-api"
primary_region = "dfw"        # Dallas — closest to Narendra's location

[build]
  dockerfile = "backend/Dockerfile"

[env]
  ENVIRONMENT = "production"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
