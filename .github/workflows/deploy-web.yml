name: Deploy Web Backend to Fly.io

on:
  push:
    branches: [main]
    paths:
      - web_app/backend/**
      - web_app/fly.toml

jobs:
  deploy:
    name: Deploy tailor-resume-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create app if not exists
        run: flyctl apps create tailor-resume-api --org personal 2>/dev/null || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        working-directory: web_app
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
