name: Deploy MCP Server to Fly.io

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - server.py
      - fly.toml
      - .claude/skills/tailor-resume/scripts/**
      - requirements*.txt

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Create app if not exists
        run: flyctl apps create tailor-resume-mcp --org personal 2>/dev/null || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
