name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core dependencies
        run: pip install -r requirements.txt

      - name: Install optional dependencies (mcp, pinecone, openai)
        run: pip install -r requirements-optional.txt

      - name: Lint with ruff
        run: python -m ruff check .claude/skills/tailor-resume/scripts/ tests/

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Coverage report
        run: python -m pytest tests/ --cov=".claude/skills/tailor-resume/scripts" --cov-report=term-missing --cov-fail-under=80
